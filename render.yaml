services:
  - type: web
    name: fundi-platform
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn fundi_platform.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: true
    envVars:
      # Pin Python: Django 4.2 LTS supports through 3.12; Render default may be 3.14+.
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "fundi-platform.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://fundi-platform.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Linked Postgres (see databases: below). Render sets this when the blueprint syncs.
      - key: DATABASE_URL
        fromDatabase:
          name: fundi-postgres
          property: connectionString

databases:
  - name: fundi-postgres
    plan: free

# After Postgres works: one-time import via Dashboard env (not committed here):
# RUN_SEED_IMPORT=true, SEED_FIXTURE_URL=<private direct link to local_export.json>
# Optional: MEDIA_ZIP_URL=<zip of local media/> — see build.sh

