services:
  - type: web
    name: fundi-platform
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn fundi_platform.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: true
    envVars:
      # Pin Python: Django 4.2 LTS supports through 3.12; Render default may be 3.14+.
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "fundi-platform.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://fundi-platform.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Optional: add DJANGO_MEDIA_ROOT if you attach a Render Disk (e.g. /var/data/media).
      # Recommended: use a managed Postgres DB and set DATABASE_URL via the Render dashboard
      # - key: DATABASE_URL
      #   sync: false

